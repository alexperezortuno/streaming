version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: streamingdb
    environment:
      POSTGRES_DB: ${DB_NAME:-streaming}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:${DB_PORT:-5432}/${DB_NAME:-streaming}?sslmode=disable"
      MEDIA_PATH: "/app/media"
      JWT_SECRET: "change-me-in-production-use-a-real-secret"
      LOG_LEVEL: "info"
      CORS_ORIGINS: "*"
      MAX_UPLOAD_SIZE: "524288000"
      TRANSCODE_WORKERS: "2"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media_data:
